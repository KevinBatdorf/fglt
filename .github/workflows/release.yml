name: Release

# Triggered by pushing a tag like v0.2.0. Builds the Windows desktop binary,
# wraps it in an NSIS installer (proper Start Menu shortcut + Apps & Features
# entry), and publishes everything to a GitHub release.
#
# Two flavors of artifact ship in the same release:
#
#   1. FindAGameLikeThat-<version>-win-x64-Setup.exe — NSIS installer.
#      This is what users download. Per-user install (no UAC), creates
#      Start Menu shortcuts, registers in Apps & Features, ships an
#      uninstaller. Same model as Discord/Slack/VS Code User Installer.
#
#   2. stable-win-x64-FindaGameLikeThat.tar.zst + stable-win-x64-update.json
#      — Electrobun's auto-updater payload. Filenames are load-bearing:
#      Electrobun's Updater concatenates them into the manifest URL.
#      Don't rename. (Auto-update polling is currently disabled in-app,
#      but we publish the payload so re-enabling later is just a code
#      change, not a release-pipeline change.)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (win-x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps
        run: bun install

      - name: Install desktop deps
        working-directory: apps/desktop
        run: bun install

      - name: Stamp version from tag
        working-directory: apps/desktop
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bun run stamp:version

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build desktop (icons + assets + vite + electrobun)
        working-directory: apps/desktop
        run: bun run build

      - name: Build NSIS installer
        working-directory: apps/desktop
        run: bun run build:installer

      # Drop the redundant Electrobun-emitted Setup.zip — the NSIS
      # installer replaces it. Keep only the auto-updater payload
      # (.tar.zst + update.json) and our new Setup.exe.
      - name: Drop redundant Electrobun Setup.zip
        shell: bash
        working-directory: apps/desktop
        run: rm -f artifacts/*-Setup.zip

      - name: List artifacts
        shell: bash
        working-directory: apps/desktop
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/artifacts/*
          fail_on_unmatched_files: true
          body: |
            Windows build for ${{ github.ref_name }}.

            **Download `FindAGameLikeThat-*-win-x64-Setup.exe`** and run it.
            The installer creates a Start Menu shortcut and an entry in
            Apps & Features. Per-user install — no admin/UAC required.

            The other two files (`*.tar.zst`, `*-update.json`) are used
            by the in-app auto-updater; you don't need to download them.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
