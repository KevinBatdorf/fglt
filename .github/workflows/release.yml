name: Release

# Triggered by pushing a tag like v0.1.0. Builds the Windows desktop
# binary and uploads the installer + auto-update artifacts to the
# GitHub release.
#
# Mac + Linux are out of scope until there's actually someone on those
# platforms asking for a binary. Adding them later means restoring the
# matrix and verifying Electrobun's output paths per platform.
#
# Electrobun's `bun run build` (which calls `electrobun build --env=stable`)
# produces three top-level files in apps/desktop/build/stable-win-x64/:
#   - "Find a Game Like That-Setup.exe"           (the installer)
#   - "Find a Game Like That-Setup.tar.zst"       (auto-update payload)
#   - "Find a Game Like That-Setup.metadata.json" (auto-update manifest)
# We rename them to predictable kebab-case so URLs are stable across
# tags and the desktop's auto-updater can hit
# `releases/latest/download/fglt-win-x64-Setup.exe` etc.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps
        run: bun install

      - name: Install desktop deps
        working-directory: apps/desktop
        run: bun install

      - name: Build desktop (icons + assets + vite + electrobun)
        working-directory: apps/desktop
        run: bun run build

      - name: Stage release artifacts
        id: stage
        shell: bash
        working-directory: apps/desktop
        run: |
          BUILD_DIR="build/stable-win-x64"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "Expected build output at $BUILD_DIR. Listing build/:"
            ls -la build/ || true
            exit 1
          fi
          echo "Build dir contents:"
          ls -la "$BUILD_DIR"
          mkdir -p artifacts
          # Rename to kebab-case + platform-prefixed so URLs are
          # stable. Using a wildcard so changes to the app's display
          # name don't break the workflow.
          cp "$BUILD_DIR"/*-Setup.exe          "artifacts/fglt-win-x64-Setup.exe"
          cp "$BUILD_DIR"/*-Setup.tar.zst      "artifacts/fglt-win-x64-Setup.tar.zst"
          cp "$BUILD_DIR"/*-Setup.metadata.json "artifacts/fglt-win-x64-update.json"
          echo "Staged artifacts:"
          ls -la artifacts

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        working-directory: apps/desktop
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "$TAG" --notes "Windows build for $TAG"
          gh release upload "$TAG" \
            artifacts/fglt-win-x64-Setup.exe \
            artifacts/fglt-win-x64-Setup.tar.zst \
            artifacts/fglt-win-x64-update.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
