name: Release

# Triggered by pushing a tag like v0.1.0. Builds the Windows desktop
# binary and uploads everything Electrobun emits in apps/desktop/artifacts/.
#
# Important: keep the original filenames. The auto-updater fetches
# `<baseUrl>/<channel>-<platform>-<arch>-update.json` and downloads
# the matching `<channel>-<platform>-<arch>-<AppName>.tar.zst`.
# Renaming any of those breaks updates. Pattern + flow taken from
# blackboardsh/audio-tts (a reference Electrobun app).
#
# Mac + Linux are out of scope until there's actually someone on those
# platforms asking for a binary.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps
        run: bun install

      - name: Install desktop deps
        working-directory: apps/desktop
        run: bun install

      - name: Build desktop (icons + assets + vite + electrobun)
        working-directory: apps/desktop
        run: bun run build

      - name: List artifacts
        shell: bash
        working-directory: apps/desktop
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/artifacts/*
          fail_on_unmatched_files: true
          body: |
            Windows build for ${{ github.ref_name }}.

            **Download `stable-win-x64-FindaGameLikeThat-Setup.zip`** —
            single self-contained installer. Extract anywhere and
            double-click the `.exe` inside.

            The other two files (`*.tar.zst`, `*-update.json`) are
            used by the in-app auto-updater; you don't need to
            download them manually.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
